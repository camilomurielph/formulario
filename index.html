<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Encuesta — ¿En qué gasta más tiempo tu empresa?</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="app">
        <!-- Encabezado -->
        <header>
            <h1>¿En qué gasta más tiempo tu empresa?</h1>
            <p>Encuesta confidencial para emprendedores e independientes</p>
        </header>

        <!-- Contenedor principal -->
        <main>
            <!-- Barra de progreso -->
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>

            <!-- Indicador de paso -->
            <div id="step-indicator">Pregunta 1 de 20</div>

            <!-- Aquí se renderiza la pregunta actual -->
            <div id="question-container"></div>

            <!-- Navegación -->
            <div id="navigation">
                <button id="prev-btn" class="nav-btn" disabled>⬅ Anterior</button>
                <button id="next-btn" class="nav-btn">Siguiente ➡</button>
            </div>

            <!-- Botón de envío (se muestra al final) -->
            <div id="submit-section" style="display: none;">
                <button id="submit-btn">📤 Enviar respuestas</button>
            </div>
        </main>

        <!-- Toast para notificaciones -->
        <div id="toast"></div>
    </div>

    <!-- Librería para exportar a Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Datos del cuestionario -->
    <script src="questions.js"></script>
    <!-- Lógica principal -->
    <script src="app.js"></script>
</body>
</html>
