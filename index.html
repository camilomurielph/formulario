<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Encuesta — ¿En qué gasta más tiempo tu empresa?</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="app">
        <!-- Encabezado -->
        <header>
            <h1>¿En qué gasta más tiempo tu empresa?</h1>
            <p>Encuesta confidencial para emprendedores e independientes</p>
        </header>

        <!-- Contenedor principal -->
        <main>
            <!-- Barra de progreso (solo visible en modo formulario) -->
            <div id="progress-bar" class="form-mode">
                <div id="progress-fill"></div>
            </div>
            <div id="step-indicator" class="form-mode">Pregunta 1 de 20</div>

            <!-- Contenedor de preguntas (modo formulario) -->
            <div id="question-container" class="form-mode"></div>

            <!-- Navegación (modo formulario) -->
            <div id="navigation" class="form-mode">
                <button id="prev-btn" class="nav-btn" disabled>⬅ Anterior</button>
                <button id="next-btn" class="nav-btn">Siguiente ➡</button>
            </div>

            <!-- Botón de envío (modo formulario) -->
            <div id="submit-section" class="form-mode" style="display: none;">
                <button id="submit-btn">📤 Enviar respuestas</button>
            </div>

            <!-- ===== PANEL DE ADMINISTRACIÓN ===== -->
            <div id="admin-panel" style="display: none;">
                <!-- Botones de acción principal -->
                <div id="admin-actions">
                    <button id="view-responses-btn" class="admin-btn">📋 Ver respuestas</button>
                    <button id="download-excel-btn" class="admin-btn">📥 Descargar Excel</button>
                    <button id="manage-responses-btn" class="admin-btn">🗂️ Administrar respuestas</button>
                    <button id="logout-btn" class="admin-btn logout">🚪 Cerrar sesión</button>
                </div>

                <!-- Contenedor para mostrar contenido (tabla o bloques) -->
                <div id="admin-content"></div>
            </div>

            <!-- Botón de acceso a admin (visible siempre) -->
            <div id="admin-trigger">
                <button id="admin-login-btn">🔐 Admin</button>
            </div>
        </main>

        <!-- Toast para notificaciones -->
        <div id="toast"></div>
    </div>

    <!-- Modal para visualizar respuesta individual -->
    <div id="response-modal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2>Detalles de la respuesta</h2>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Librerías para Excel -->
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <!-- Datos del cuestionario -->
    <script src="questions.js"></script>
    <!-- Lógica principal -->
    <script src="app.js"></script>
</body>
</html>
